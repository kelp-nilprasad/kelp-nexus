name: kelp-nexus

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kelp
      POSTGRES_PASSWORD: kelp
      POSTGRES_DB: kelp_nexus
    ports:
      # Override KELP_DB_PORT if 5432 is taken locally (e.g. KELP_DB_PORT=5544).
      # In-compose traffic uses the `db` service name on 5432 regardless.
      - "${KELP_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelp -d kelp_nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    # Secrets (MSAL client id/secret/tenant, etc.) are injected at RUNTIME from
    # apps/api/.env — never baked into the image (see .dockerignore).
    # `environment:` below overrides any same-named key from this file, so the
    # prod-specific values win over the local-dev defaults in apps/api/.env.
    env_file:
      - apps/api/.env
    environment:
      # Point at your server's Postgres by exporting DATABASE_URL; falls back to
      # the bundled `db` service for a self-contained stack.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kelp:kelp@db:5432/kelp_nexus}
      # Set a strong JWT_SECRET in the deploy environment.
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      DEV_LOGIN: "true"
      # production => Secure cookies (works because nginx terminates TLS).
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WEB_BASE_URL: https://kelpllm.kelpglobal.co.in:6101
      CORS_ORIGINS: '["https://kelpllm.kelpglobal.co.in:6101"]'
      # MSAL/Entra: the redirect URI must match a Web redirect URI registered in
      # the Entra app registration exactly (public origin, /api/v1 path, port 6101).
      # Overrides the localhost value in apps/api/.env.
      MSAL_REDIRECT_URI: https://kelpllm.kelpglobal.co.in:6101/api/v1/auth/callback
    ports:
      - "8000:8000"
    # Migrate, seed, then serve.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    depends_on:
      - api
    environment:
      API_INTERNAL_URL: http://api:8000
    # No host port: traffic now enters through nginx. Expose it again here if you
    # need to reach the app directly without TLS.
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      # Public HTTPS entrypoint: https://kelpllm.kelpglobal.co.in:6101
      - "6101:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Existing certs. Point KELP_CERTS_DIR at the host folder holding
      # fullchain.pem + privkey.pem (defaults to ./infra/nginx/certs).
      - ${KELP_CERTS_DIR:-./infra/nginx/certs}:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  pgdata:
