name: kelp-nexus

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - azurite:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    depends_on:
      azurite:
        condition: service_started
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://kelpv2:7RozN#prEEyrIy#HB!W@postgres18:5432/kelp_nexus
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      JWT_SECRET: dev-insecure-change-me
      DEV_LOGIN: "true"
      ENVIRONMENT: development
      CORS_ORIGINS: '["https://kelpllm.kelpglobal.co.in:6101"]'
    networks:
      - default
      - postgres_default
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 384M
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://api:8000
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "6101:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${KELP_CERTS_DIR:-./infra/nginx/certs}:/etc/nginx/certs:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 32M

networks:
  default:
    driver: bridge
  postgres_default:
    external: true

volumes:
  pgdata:
  azurite:

