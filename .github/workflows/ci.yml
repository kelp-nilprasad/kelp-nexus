name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kelp
          POSTGRES_PASSWORD: kelp
          POSTGRES_DB: kelp_nexus
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kelp -d kelp_nexus"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        env:
          DATABASE_URL: postgresql+psycopg://kelp:kelp@localhost:5432/kelp_nexus
        run: pytest -q

  web:
    name: Web — lint, typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  images:
    name: Build & push images
    needs: [api, web]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kelp-nexus-api:latest
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kelp-nexus-web:latest
