apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kelp-postgres
  namespace: kelp-nexus
spec:
  serviceName: kelp-postgres
  replicas: 1
  selector:
    matchLabels:
      app: kelp-postgres
  template:
    metadata:
      labels:
        app: kelp-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: kelp
            - name: POSTGRES_DB
              value: kelp_nexus
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kelp-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kelp", "-d", "kelp_nexus"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kelp-postgres
  namespace: kelp-nexus
spec:
  selector:
    app: kelp-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
