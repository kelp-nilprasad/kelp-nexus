apiVersion: apps/v1
kind: Deployment
metadata:
  name: kelp-api
  namespace: kelp-nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kelp-api
  template:
    metadata:
      labels:
        app: kelp-api
    spec:
      containers:
        - name: api
          image: ghcr.io/kelp/kelp-nexus-api:latest
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: kelp-config
            - secretRef:
                name: kelp-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: kelp-api
  namespace: kelp-nexus
spec:
  selector:
    app: kelp-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kelp-api
  namespace: kelp-nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kelp-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
