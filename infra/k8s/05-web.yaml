apiVersion: apps/v1
kind: Deployment
metadata:
  name: kelp-web
  namespace: kelp-nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kelp-web
  template:
    metadata:
      labels:
        app: kelp-web
    spec:
      containers:
        - name: web
          image: ghcr.io/kelp/kelp-nexus-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: kelp-config
                  key: API_INTERNAL_URL
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kelp-web
  namespace: kelp-nexus
spec:
  selector:
    app: kelp-web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kelp-web
  namespace: kelp-nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kelp-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
