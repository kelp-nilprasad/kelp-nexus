# Kelp Nexus — TLS-terminating reverse proxy.
#
# The browser only ever talks to the Next.js `web` service: it serves the app and
# proxies /api/* to the FastAPI backend internally (see apps/web/next.config.mjs),
# so nginx has a single upstream and we don't expose the API directly.

# Map for the Connection header used in the WebSocket upgrade below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream kelp_web {
    server web:3000;
}

# ---- HTTP: redirect everything to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow ACME http-01 renewals to pass through if you ever wire up certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # App is served over HTTPS on the non-standard port 6101.
        return 301 https://$host:6101$request_uri;
    }
}

# ---- HTTPS: terminate TLS, proxy to the web app ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # Existing certificates, mounted read-only from the host (see docker-compose).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Report uploads can carry sizeable HTML/PDF payloads.
    client_max_body_size 50m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://kelp_web;
        proxy_http_version 1.1;

        # WebSocket / Next.js HMR upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # $http_host preserves the host *and* non-standard port (…:6101) so the
        # app generates correct absolute URLs / redirects behind the proxy.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout 300s;
    }
}
